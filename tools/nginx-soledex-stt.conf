# nginx reverse-proxy fronting the localhost-bound whisper.cpp STT server with
# HTTPS + basic auth, so the Tab5 can reach it over the internet safely
# (whisper-server has no auth of its own). Add this `location` to the HTTPS
# server block for your domain. See the README "Hosting the STT server" section.
#
#   # one-off: create the credential file (user "soledex" here)
#   printf 'soledex:%s\n' "$(openssl passwd -apr1 'YOUR_PASSWORD')" \
#       | sudo tee /etc/nginx/.htpasswd-soledex >/dev/null
#   sudo chown root:www-data /etc/nginx/.htpasswd-soledex
#   sudo chmod 640 /etc/nginx/.htpasswd-soledex
#
# A real (Let's Encrypt) cert is recommended: the Tab5 verifies the endpoint
# against the Mozilla CA bundle, so a self-signed cert is rejected on-device.

location /stt/ {
    auth_basic "soledex STT";
    auth_basic_user_file /etc/nginx/.htpasswd-soledex;

    proxy_pass http://127.0.0.1:8080/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # WAV uploads + slow CPU transcription
    client_max_body_size 25m;
    proxy_read_timeout   120s;
    proxy_send_timeout   120s;
}
